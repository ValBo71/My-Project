<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Влутен Конвертор | BGN - EUR</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="converter-card">
        <h1>Валутен Конвертор</h1>
        
        <div class="input-group">
            <label for="bgn">Български Лев (BGN)</label>
            <div class="input-wrapper">
                <input type="number" id="bgn" placeholder="0.00" step="0.01">
                <span class="currency-flag">🇧🇬</span>
            </div>
        </div>

        <div class="exchange-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 10v12"/><path d="M15 10.5a2.5 2.5 0 0 1 5 0v10.5"/><path d="M21 16.5a2.5 2.5 0 0 1-5 0h-5"/><path d="M7 10L3 14"/><path d="M7 10l4 4"/><path d="M15 13.5l-4-4"/><path d="M15 13.5l4-4"/></svg>
            <!-- Using a simple arrow icon for swap visual, actually just static for now as auto-calc is better -->
            <span class="rate-info">1 EUR = 1.95583 BGN</span>
        </div>

        <div class="input-group">
            <label for="eur">Евро (EUR)</label>
            <div class="input-wrapper">
                <input type="number" id="eur" placeholder="0.00" step="0.01">
                <span class="currency-flag">🇪🇺</span>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
